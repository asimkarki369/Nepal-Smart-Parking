name: Deploy NSP Driver to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: NSPDriverExpo/package-lock.json

      # 3. Install dependencies
      - name: Install dependencies
        working-directory: NSPDriverExpo
        run: npm ci

      # 4. Export Expo web build
      #    PUBLIC_URL sets the base path for GitHub Pages
      - name: Build Expo web
        working-directory: NSPDriverExpo
        env:
          PUBLIC_URL: /Nepal-Smart-Parking
        run: npx expo export --platform web --output-dir dist

      # 5. Add .nojekyll so GitHub Pages serves _expo/ folder correctly
      - name: Add .nojekyll
        run: touch NSPDriverExpo/dist/.nojekyll

      # 6. Upload the dist folder as a Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: NSPDriverExpo/dist

      # 7. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
